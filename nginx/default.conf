# ── Rate-limit zones ────────────────────────────────────────────────────────
# Auth endpoints: max 10 requests/minute per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
# General API: max 120 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:20m  rate=120r/m;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream api_backend {
    server yallaplay_api:7000;
    keepalive 32;
}

# ── Gzip ─────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types application/json text/plain text/css application/javascript;
gzip_min_length 1024;

# ── Server block ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Max upload size (matches NestJS 10mb limit)
    client_max_body_size 10m;

    # Security headers
    add_header X-Frame-Options        "DENY"                            always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health check (used by Docker & load balancers) ──────────────────────
    location = /health {
        access_log off;
        proxy_pass http://api_backend/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Auth endpoints — strict rate limit ──────────────────────────────────
    location ~ ^/api/v1/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection          "";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── All other API routes ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          $connection_upgrade;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Static uploads served directly by nginx (faster than NestJS) ────────
    location /uploads/ {
        alias              /app/uploads/;
        expires            7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log         off;
    }

    # ── Block everything else ────────────────────────────────────────────────
    location / {
        return 404 '{"success":false,"message":"Not Found"}';
        add_header Content-Type application/json;
    }
}

# WebSocket upgrade map — '' means regular HTTP (keep Connection empty for upstream keepalive)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}
