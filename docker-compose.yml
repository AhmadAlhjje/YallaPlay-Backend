services:

  # ── Redis (required for Bull job queues) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yallaplay_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - yallaplay_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: yallaplay_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: yallaplay
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: yallaplay
    volumes:
      - mongo_data:/data/db
    # No external ports — MongoDB is only accessible inside Docker network
    networks:
      - yallaplay_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── NestJS API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yallaplay_api
    restart: unless-stopped
    expose:
      - "7000"          # internal only — nginx handles external traffic on port 80
    env_file:
      - .env.production
    volumes:
      - wa_session:/app/.wa_session
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - yallaplay_net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── nginx reverse proxy ───────────────────────────────────────────────────
  # The ONLY service exposed to the internet.
  # Port 80 works through all VPNs and firewalls.
  nginx:
    image: nginx:alpine
    container_name: yallaplay_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - api
    networks:
      - yallaplay_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  redis_data:
  wa_session:
  uploads:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  yallaplay_net:
    driver: bridge
